name: Build Flet APK
   on:
     push:
       branches: [ main ]

   jobs:
     build:
       runs-on: ubuntu-latest
       steps:
         - id: checkout
           uses: actions/checkout@v4

         - id: setup-python
           uses: actions/setup-python@v5
           with:
             python-version: '3.10'

         - id: setup-flutter
           uses: subosito/flutter-action@v2
           with:
             channel: 'stable'

         - name: Install Flet and Build APK
           run: |
             pip install flet
             flet build apk
            
         - name: Upload APK Artifact
           uses: actions/upload-artifact@v4
           with:
             name: flet-app-apk
             path: build/apk/*.apk
